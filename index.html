<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字母表謎題 — P的妄想</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0d0d0d;
    color: #e8e0d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100%; max-width: 860px; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── INTRO SCREEN ── */
  #screen-intro {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    background: radial-gradient(ellipse at center, #1a1010 0%, #0d0d0d 100%);
  }
  #screen-intro .subtitle { color: #8a7060; font-size: 14px; letter-spacing: 4px; margin-bottom: 16px; }
  #screen-intro h1 { font-size: 36px; color: #c8a882; margin-bottom: 8px; text-shadow: 0 0 20px #8b4513; }
  #screen-intro .chapter { font-size: 20px; color: #a08060; margin-bottom: 24px; }
  .hero-image {
    width: 100%; max-width: 560px;
    border-radius: 10px;
    border: 1px solid #3a2a1a;
    margin: 0 auto 24px;
    display: block;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .video-box {
    width: 100%; max-width: 560px;
    aspect-ratio: 16/9;
    background: #1a1a1a;
    border: 1px solid #3a2a1a;
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 32px;
    color: #5a4a3a;
    font-size: 14px;
    gap: 8px;
  }
  .video-box .icon { font-size: 48px; }
  .video-box small { font-size: 12px; color: #3a3028; }
  .btn {
    padding: 14px 40px;
    background: #6b2d1a;
    color: #e8d8c0;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: background 0.2s;
  }
  .btn:hover { background: #8b3d2a; }
  .btn.secondary { background: #2a2a2a; font-size: 14px; padding: 10px 28px; margin-top: 12px; }
  .btn.secondary:hover { background: #3a3a3a; }

  /* ── CLUE BOARD ── */
  #screen-clues {
    padding: 32px 20px;
    background: #0f0f0f;
  }
  .board-title {
    text-align: center;
    color: #c8a882;
    font-size: 22px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .board-subtitle { text-align: center; color: #6a5a4a; font-size: 13px; margin-bottom: 28px; }

  .case-summary {
    background: #1a1510;
    border-left: 3px solid #6b2d1a;
    padding: 16px 20px;
    border-radius: 4px;
    margin-bottom: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: #c0b0a0;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: #6b2d1a;
    margin-bottom: 12px;
    border-bottom: 1px solid #2a1a10;
    padding-bottom: 6px;
  }

  .suspects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .suspect-card {
    background: #181410;
    border: 1px solid #2a2018;
    border-radius: 6px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .suspect-card:hover { border-color: #6b2d1a; background: #201a14; }
  .suspect-card .name { font-size: 15px; color: #d0b890; margin-bottom: 4px; }
  .suspect-card .role { font-size: 12px; color: #7a6a5a; }

  .clues-list { margin-bottom: 32px; }
  .clue-item {
    background: #141210;
    border: 1px solid #2a2018;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.7;
    color: #b0a090;
    position: relative;
    padding-left: 44px;
  }
  .clue-num {
    position: absolute;
    left: 14px; top: 14px;
    width: 22px; height: 22px;
    background: #2a1510;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #8b3d2a;
    font-weight: bold;
  }

  .board-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  /* ── SUSPECT MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #1a1510;
    border: 1px solid #3a2818;
    border-radius: 8px;
    padding: 28px;
    max-width: 420px;
    width: 90%;
  }
  .modal h3 { color: #c8a882; margin-bottom: 4px; }
  .modal .modal-role { color: #7a6a5a; font-size: 13px; margin-bottom: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal .field-label { font-size: 11px; color: #6b2d1a; letter-spacing: 2px; margin-bottom: 4px; }
  .modal .field-value { font-size: 14px; color: #b0a090; line-height: 1.6; }
  .modal-close { margin-top: 20px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e3a1e;
    border: 1px solid #4a8a4a;
    color: #8aba8a;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 13px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    pointer-events: none;
    max-width: 90vw;
    white-space: normal;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── CLUE BADGE ── */
  .clue-badge-wrap {
    margin-left: auto;
    position: relative;
  }
  .clue-badge {
    background: #2a1a0a;
    border: 1px solid #6b2d1a;
    color: #c8a882;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    cursor: default;
    white-space: nowrap;
  }
  .clue-badge.has-clues { background: #1e3010; border-color: #5a8a3a; color: #8aba6a; }

  .clue-popover {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: #1a1510;
    border: 1px solid #3a2818;
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 240px;
    z-index: 300;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .clue-badge-wrap:hover .clue-popover { display: block; }
  .clue-popover-title { font-size: 11px; color: #6b2d1a; letter-spacing: 2px; margin-bottom: 10px; }
  .clue-popover-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #2a1a10;
    font-size: 12px;
    line-height: 1.5;
  }
  .clue-popover-item:last-child { border-bottom: none; }
  .clue-popover-item.found { color: #8aba8a; }
  .clue-popover-item.not-found { color: #4a3a2a; }

  /* ── DISCOVERED CLUES (in accusation) ── */
  .discovered-clues {
    width: 100%;
    background: #141210;
    border: 1px solid #2a3818;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: none;
  }
  .discovered-clues.visible { display: block; }
  .discovered-clues .dc-title { font-size: 11px; color: #5a8a3a; letter-spacing: 2px; margin-bottom: 10px; }
  .discovered-clue-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid #1e2818;
    font-size: 13px; color: #8ab88a; line-height: 1.5;
  }
  .discovered-clue-item:last-child { border-bottom: none; }

  /* ── CHAT SCREEN ── */
  #screen-chat {
    padding: 0;
    background: #0f0f0f;
  }
  .chat-header {
    padding: 16px 20px;
    background: #141210;
    border-bottom: 1px solid #2a2018;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .chat-header .back-btn {
    background: none;
    border: none;
    color: #7a6a5a;
    font-size: 20px;
    cursor: pointer;
    padding: 0 8px 0 0;
  }
  .chat-header .assistant-info .name { font-size: 15px; color: #c8a882; }
  .chat-header .assistant-info .status { font-size: 12px; color: #5a9a5a; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
    height: calc(100vh - 160px);
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #1e1a14;
    border: 1px solid #2a2018;
    color: #c0b0a0;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: #3a1a0a;
    color: #e0d0b8;
    border-bottom-right-radius: 4px;
  }
  .msg.thinking {
    align-self: flex-start;
    background: #141210;
    border: 1px solid #2a2018;
    color: #5a4a3a;
    font-style: italic;
    font-size: 13px;
  }

  .chat-input-area {
    padding: 12px 16px;
    background: #141210;
    border-top: 1px solid #2a2018;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .chat-input-area textarea {
    flex: 1;
    background: #1e1a14;
    border: 1px solid #3a2a18;
    border-radius: 8px;
    color: #e8e0d0;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    outline: none;
  }
  .chat-input-area textarea:focus { border-color: #6b2d1a; }
  .send-btn {
    background: #6b2d1a;
    border: none;
    color: #e8d8c0;
    width: 44px; height: 44px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .send-btn:hover { background: #8b3d2a; }
  .send-btn:disabled { background: #2a1a10; color: #4a3a2a; cursor: not-allowed; }

  .quick-questions {
    padding: 10px 16px;
    background: #0f0f0f;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid #1e1a14;
  }
  .quick-btn {
    background: #1e1a14;
    border: 1px solid #2a2018;
    color: #8a7a6a;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quick-btn:hover { border-color: #6b2d1a; color: #c0a880; }

  /* ── ACCUSATION SCREEN ── */
  #screen-accuse {
    padding: 32px 20px;
    align-items: center;
  }
  #screen-accuse h2 { color: #c8a882; font-size: 24px; margin-bottom: 8px; text-align: center; }
  #screen-accuse p { color: #7a6a5a; font-size: 14px; margin-bottom: 32px; text-align: center; }
  .accuse-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    width: 100%;
    margin-bottom: 24px;
  }
  .accuse-card {
    background: #181410;
    border: 2px solid #2a2018;
    border-radius: 8px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .accuse-card:hover { border-color: #c8a882; background: #201a14; transform: translateY(-2px); }
  .accuse-card.selected { border-color: #c8a882; background: #201a14; }
  .accuse-card .acc-name { font-size: 16px; color: #d0b890; margin-bottom: 6px; }
  .accuse-card .acc-role { font-size: 12px; color: #6a5a4a; }

  .reasoning-box {
    width: 100%;
    background: #1a1510;
    border: 1px solid #3a2818;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }
  .reasoning-box.visible { display: block; }
  .reasoning-box .selected-label { font-size: 12px; color: #6b2d1a; letter-spacing: 2px; margin-bottom: 6px; }
  .reasoning-box .selected-name { font-size: 18px; color: #c8a882; margin-bottom: 16px; }
  .reasoning-box textarea {
    width: 100%;
    background: #141210;
    border: 1px solid #2a2018;
    border-radius: 6px;
    color: #e8e0d0;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 100px;
    outline: none;
    line-height: 1.7;
  }
  .reasoning-box textarea:focus { border-color: #6b2d1a; }
  .reasoning-box .reasoning-hint { font-size: 12px; color: #4a3a2a; margin-bottom: 10px; }
  .judging-msg { color: #8a7060; font-size: 14px; font-style: italic; text-align: center; margin: 12px 0; display: none; }

  /* ── RESULT SCREEN ── */
  #screen-result {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
  }
  .result-icon { font-size: 72px; margin-bottom: 24px; }
  #screen-result h2 { font-size: 28px; margin-bottom: 16px; }
  #screen-result.correct h2 { color: #6ab06a; }
  #screen-result.wrong h2 { color: #b06a6a; }
  .result-truth {
    background: #1a1510;
    border: 1px solid #3a2818;
    border-radius: 8px;
    padding: 20px;
    max-width: 500px;
    text-align: left;
    margin: 24px auto;
    font-size: 14px;
    line-height: 1.8;
    color: #b0a090;
  }
  .result-truth strong { color: #c8a882; }
</style>
</head>
<body>

<!-- ══ INTRO SCREEN ══ -->
<div id="screen-intro" class="screen active">
  <div class="subtitle">ALPHABET MYSTERY</div>
  <h1>字母表謎題</h1>
  <div class="chapter">第一章：P 的 妄 想</div>

  <img src="四個推理主角.jpg" class="hero-image" alt="四位推理主角">

  <a href="https://notebooklm.google.com/notebook/153ab160-9aad-40b1-8654-b10bfcc3a761/artifact/8a305b93-1e66-40ed-bacb-8d65ceac078c?utm_source=nlm_web_share&utm_medium=google_oo&utm_campaign=art_share_1&utm_content=&utm_smc=nlm_web_share_google_oo_art_share_1_" target="_blank" style="text-decoration:none;display:block;max-width:560px;width:100%;margin:0 auto 24px;">
    <div class="video-box" style="cursor:pointer;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor='#6b2d1a';this.style.background='#1e1410'" onmouseout="this.style.borderColor='#3a2a1a';this.style.background='#1a1a1a'">
      <div class="icon">🎧</div>
      <div style="color:#c8a882;">收聽案件導覽音頻</div>
      <small style="color:#5a4a3a;">由 NotebookLM 生成 · 點擊在新分頁開啟</small>
    </div>
  </a>

  <button class="btn" onclick="goToScreen('screen-clues')">開始調查</button>
</div>

<!-- ══ CLUE BOARD ══ -->
<div id="screen-clues" class="screen">
  <div style="position:relative; overflow:hidden; height:160px; background:#0a0808;">
    <img src="四個推理主角.jpg" style="width:100%;object-fit:cover;object-position:center top;opacity:0.35;filter:grayscale(30%);">
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,#0f0f0f 100%);"></div>
    <div style="position:absolute;bottom:16px;left:20px;">
      <div class="board-title" style="text-align:left;margin:0 0 4px;">案件資料室</div>
      <div class="board-subtitle" style="text-align:left;margin:0;">P 的 妄 想</div>
    </div>
  </div>
  <div style="padding: 20px 20px 0;">
    <div class="board-title" style="display:none;"></div>
    <div class="board-subtitle" style="display:none;"></div>

    <div class="case-summary" id="case-summary">讀取中...</div>

    <div class="section-label">嫌 疑 人</div>
    <div class="suspects-grid" id="suspects-grid"></div>

    <div class="section-label">已知線索</div>
    <div class="clues-list" id="clues-list"></div>

    <div class="board-actions">
      <button class="btn" onclick="goToScreen('screen-chat')">進入線索調查室</button>
      <button class="btn secondary" onclick="goToScreen('screen-accuse')">指認兇手</button>
    </div>
    <div style="height: 32px;"></div>
  </div>
</div>

<!-- ══ SUSPECT MODAL ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-name"></h3>
    <div class="modal-role" id="modal-role"></div>
    <div class="field">
      <div class="field-label">可疑動機</div>
      <div class="field-value" id="modal-motive"></div>
    </div>
    <div class="field">
      <div class="field-label">不在場說詞</div>
      <div class="field-value" id="modal-alibi"></div>
    </div>
    <button class="btn secondary modal-close" onclick="closeModal()">關閉</button>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ CHAT SCREEN ══ -->
<div id="screen-chat" class="screen">
  <div class="chat-header">
    <button class="back-btn" onclick="goToScreen('screen-clues')">←</button>
    <div class="assistant-info">
      <div class="name">偵探助理</div>
      <div class="status">● 線上調查中</div>
    </div>
    <div class="clue-badge-wrap">
      <div class="clue-badge" id="clue-badge">🔎 0 / 4</div>
      <div class="clue-popover" id="clue-popover">
        <div class="clue-popover-title">關鍵線索進度</div>
        <div id="clue-popover-list"></div>
      </div>
    </div>
  </div>

  <div class="quick-questions">
    <button class="quick-btn" onclick="sendQuick('被害人如何死亡？')">被害人如何死亡？</button>
    <button class="quick-btn" onclick="sendQuick('案發當天各人在哪？')">案發當天各人在哪？</button>
    <button class="quick-btn" onclick="sendQuick('現場有什麼異常？')">現場有什麼異常？</button>
    <button class="quick-btn" onclick="sendQuick('誰最有嫌疑？')">誰最有嫌疑？</button>
    <button class="quick-btn" onclick="sendQuick('地毯有什麼問題？')">地毯有什麼問題？</button>
  </div>

  <div class="chat-messages" id="chat-messages"></div>

  <div class="chat-input-area">
    <textarea
      id="chat-input"
      placeholder="向偵探助理提問..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- ══ ACCUSATION SCREEN ══ -->
<div id="screen-accuse" class="screen">
  <h2>指認兇手</h2>
  <p>選出你認為的兇手，並說明你的推理依據</p>
  <div class="accuse-grid" id="accuse-grid"></div>

  <div class="discovered-clues" id="discovered-clues-panel">
    <div class="dc-title">🔎 線索調查中已發現的關鍵線索</div>
    <div id="discovered-clues-list"></div>
  </div>

  <div class="reasoning-box" id="reasoning-box">
    <div class="selected-label">你指認的兇手</div>
    <div class="selected-name" id="selected-name"></div>

    <div style="margin-bottom:14px;">
      <div style="font-size:11px;color:#6b2d1a;letter-spacing:2px;margin-bottom:8px;">推理需涵蓋以下 4 個關鍵點</div>
      <div id="key-points-checklist"></div>
    </div>

    <textarea id="reasoning-input" placeholder="把你的推理寫下來，盡量涵蓋以上 4 個關鍵點..."></textarea>
    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn" id="submit-accuse-btn" onclick="submitAccuse()">提交推理</button>
      <button class="btn secondary" onclick="cancelAccuse()">重新選擇</button>
    </div>
  </div>

  <div class="judging-msg" id="judging-msg">AI 正在評斷你的推理...</div>
  <button class="btn secondary" style="margin-top:8px;" onclick="goToScreen('screen-clues')">← 回到案件資料室</button>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="screen-result" class="screen">
  <div class="result-icon" id="result-icon"></div>
  <h2 id="result-title"></h2>
  <div class="result-truth" id="result-truth"></div>

function checkClueKeywords(text) {
  CLUE_KEYWORDS.forEach(clue => {

      discoveredClues.add(clue.id);
      showToast(clue.tip);
      updateClueBadge();
    }
  });
}

}

4. 【嚴格禁止】回答結尾加任何問句或引導，例如「你有沒有注意到…」「你覺得呢？」「是不是很奇怪？」「你想想看…」——這些一律不准出現
5. 回答完就結束，句點收尾，不加任何延伸
6. 只有玩家主動說「給我提示」「有什麼線索嗎」才可以主動引導
7. 禁止使用：「然而」「此乃」「不妨」「值得注意的是」等文謅謅的詞
`;

  chatHistory = [{ role: 'user', parts: [{ text: systemContext + '\n\n請用一句話自我介紹，告訴玩家你能幫什麼忙。' }] }];

  addMessage('assistant', '思考中...', 'thinking');

  callGemini().then(reply => {
    removeLast();
    addMessage('assistant', reply);
  });
}

function addMessage(role, text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + (cls || role);
  div.textContent = text;
  const container = document.getElementById('chat-messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function removeLast() {
  const container = document.getElementById('chat-messages');
  if (container.lastChild) container.removeChild(container.lastChild);
}

async function callGemini() {
  const body = { contents: chatHistory };
  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '（無法回應，請再試一次）';
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || document.getElementById('send-btn').disabled) return;

  input.value = '';
  autoResize(input);

  addMessage('user', text);
  chatHistory.push({ role: 'user', parts: [{ text }] });

  document.getElementById('send-btn').disabled = true;
  const thinking = addMessage('assistant', '正在思考...', 'thinking');

  const reply = await callGemini();
  thinking.remove();
  addMessage('assistant', reply);
  chatHistory.push({ role: 'model', parts: [{ text: reply }] });
  checkClueKeywords(reply);

  document.getElementById('send-btn').disabled = false;
}

function sendQuick(q) {
  document.getElementById('chat-input').value = q;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

loadStory();
